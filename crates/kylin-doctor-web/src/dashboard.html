<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>kylin-doctor 系统诊断</title>
<script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0f172a;--card:#1e293b;--border:#334155;--text:#e2e8f0;--muted:#94a3b8;--green:#22c55e;--yellow:#eab308;--red:#ef4444;--blue:#3b82f6;--cyan:#06b6d4}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
header{background:var(--card);border-bottom:1px solid var(--border);padding:16px 24px;display:flex;align-items:center;justify-content:space-between}
header h1{font-size:20px;display:flex;align-items:center;gap:8px}
header h1 span{color:var(--cyan)}
.status-dot{width:8px;height:8px;border-radius:50%;display:inline-block}
.status-dot.ok{background:var(--green)}.status-dot.warn{background:var(--yellow)}.status-dot.err{background:var(--red)}
.container{max-width:1400px;margin:0 auto;padding:24px}
.actions{display:flex;gap:12px;margin-bottom:24px;flex-wrap:wrap}
.btn{padding:10px 20px;border:1px solid var(--border);border-radius:8px;background:var(--card);color:var(--text);cursor:pointer;font-size:14px;transition:all .2s}
.btn:hover{border-color:var(--cyan);color:var(--cyan)}
.btn.primary{background:var(--cyan);color:#000;border-color:var(--cyan);font-weight:600}
.btn.primary:hover{opacity:.9}
.btn:disabled{opacity:.5;cursor:not-allowed}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:24px}
.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:16px;margin-bottom:24px}
.card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:20px;transition:all .2s}
.card:hover{border-color:var(--cyan)}
.card .label{font-size:13px;color:var(--muted);margin-bottom:8px}
.card .value{font-size:28px;font-weight:700}
.card .sub{font-size:12px;color:var(--muted);margin-top:4px}
.card.ok .value{color:var(--green)}.card.warn .value{color:var(--yellow)}.card.err .value{color:var(--red)}
.section{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:20px;margin-bottom:16px}
.section h2{font-size:16px;margin-bottom:16px;display:flex;align-items:center;gap:8px}
.finding{border:1px solid var(--border);border-radius:8px;padding:14px;margin-bottom:10px;transition:all .2s}
.finding:hover{border-color:var(--cyan)}
.finding .header{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.finding .badge{font-size:11px;padding:2px 8px;border-radius:4px;font-weight:600}
.finding .badge.critical{background:var(--red);color:#fff}
.finding .badge.warning{background:var(--yellow);color:#000}
.finding .badge.info{background:var(--blue);color:#fff}
.finding .title{font-weight:600;font-size:14px}
.finding .desc{font-size:13px;color:var(--muted);margin-bottom:6px}
.finding .fix{font-size:12px;color:var(--cyan);background:rgba(6,182,212,.1);padding:6px 10px;border-radius:6px}
.finding .evidence{font-size:11px;color:var(--muted);font-family:monospace;background:rgba(0,0,0,.3);padding:6px 10px;border-radius:4px;margin-top:6px;white-space:pre-wrap;max-height:120px;overflow-y:auto}
.empty{text-align:center;padding:40px;color:var(--muted)}
.spinner{display:inline-block;width:16px;height:16px;border:2px solid var(--border);border-top-color:var(--cyan);border-radius:50%;animation:spin .6s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.chart-container{height:300px}
footer{text-align:center;padding:20px;color:var(--muted);font-size:12px}
/* Chat panel */
.chat-panel{position:fixed;bottom:20px;right:20px;width:400px;height:500px;background:var(--card);border:1px solid var(--border);border-radius:12px;display:flex;flex-direction:column;z-index:1000;box-shadow:0 4px 20px rgba(0,0,0,.3)}
.chat-header{padding:12px 16px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;cursor:pointer}
.chat-header h3{font-size:14px;display:flex;align-items:center;gap:6px}
.chat-messages{flex:1;overflow-y:auto;padding:12px;font-size:13px}
.chat-msg{margin-bottom:10px;padding:8px 12px;border-radius:8px;max-width:90%}
.chat-msg.user{background:var(--blue);color:#fff;margin-left:auto;text-align:right}
.chat-msg.assistant{background:rgba(255,255,255,.08)}
.chat-msg.tool{background:rgba(6,182,212,.1);color:var(--cyan);font-size:12px;font-family:monospace}
.chat-input{display:flex;gap:8px;padding:12px;border-top:1px solid var(--border)}
.chat-input input{flex:1;background:rgba(255,255,255,.05);border:1px solid var(--border);border-radius:6px;padding:8px 12px;color:var(--text);font-size:13px;outline:none}
.chat-input input:focus{border-color:var(--cyan)}
.chat-input button{background:var(--cyan);color:#000;border:none;border-radius:6px;padding:8px 16px;cursor:pointer;font-weight:600}
.chat-toggle{position:fixed;bottom:20px;right:20px;width:50px;height:50px;background:var(--cyan);color:#000;border:none;border-radius:50%;cursor:pointer;font-size:20px;z-index:999;box-shadow:0 2px 10px rgba(6,182,212,.3)}
.chat-toggle:hover{opacity:.9}
.chat-panel.hidden{display:none}
/* Report buttons */
.report-actions{display:flex;gap:8px;margin-left:auto}
</style>
</head>
<body>
<header>
  <h1>🔍 <span>kylin-doctor</span> 系统诊断仪表盘</h1>
  <div style="display:flex;align-items:center;gap:16px">
    <div class="report-actions">
      <button class="btn" onclick="exportJSON()">📄 JSON 报告</button>
      <button class="btn" onclick="exportHTML()">📊 HTML 报告</button>
    </div>
    <div><span class="status-dot ok" id="statusDot"></span> <span id="statusText" style="font-size:13px;color:var(--muted)">就绪</span></div>
  </div>
</header>

<div class="container">
  <!-- 系统概览 -->
  <div class="cards" id="overview-cards">
    <div class="card"><div class="label">主机名</div><div class="value" id="ov-hostname" style="font-size:18px">--</div></div>
    <div class="card"><div class="label">CPU</div><div class="value" id="ov-cpu">--</div><div class="sub" id="ov-load">负载 --</div></div>
    <div class="card"><div class="label">内存</div><div class="value" id="ov-mem">--</div><div class="sub" id="ov-mem-detail">--</div></div>
    <div class="card"><div class="label">运行时间</div><div class="value" id="ov-uptime" style="font-size:18px">--</div><div class="sub" id="ov-kernel">--</div></div>
  </div>

  <!-- 图表区 -->
  <div class="grid-2">
    <div class="section">
      <h2>📊 模块健康度</h2>
      <div id="chart-health" class="chart-container"></div>
    </div>
    <div class="section">
      <h2>📈 问题分布</h2>
      <div id="chart-findings" class="chart-container"></div>
    </div>
  </div>

  <!-- 操作按钮 -->
  <div class="actions">
    <button class="btn primary" id="btnScan" onclick="runScan()">🔍 全面扫描</button>
    <button class="btn" onclick="runScanWS()">⚡ 实时扫描 (WS)</button>
    <button class="btn" onclick="runScan('system')">💻 系统</button>
    <button class="btn" onclick="runScan('hardware')">🔧 硬件</button>
    <button class="btn" onclick="runScan('software')">📦 软件</button>
    <button class="btn" onclick="runScan('security')">🔒 安全</button>
    <button class="btn" onclick="runScan('performance')">⚡ 性能</button>
  </div>

  <!-- 扫描结果 -->
  <div id="results">
    <div class="empty">点击「全面扫描」或选择单个模块开始诊断</div>
  </div>
</div>

<footer>kylin-doctor v0.1.0 — 银河麒麟桌面系统自我诊断工具</footer>

<!-- Chat toggle button -->
<button class="chat-toggle" id="chatToggle" onclick="toggleChat()">🤖</button>

<!-- Chat panel -->
<div class="chat-panel hidden" id="chatPanel">
  <div class="chat-header" onclick="toggleChat()">
    <h3>🤖 AI 助手</h3>
    <span style="color:var(--muted);font-size:12px" id="chatStatus">点击连接</span>
  </div>
  <div class="chat-messages" id="chatMessages"></div>
  <div class="chat-input">
    <input type="text" id="chatInput" placeholder="输入问题... (Enter 发送)" onkeydown="if(event.key==='Enter')sendChat()">
    <button onclick="sendChat()">发送</button>
  </div>
</div>

<script>
// ==================== State ====================
const MODULES = ['system','hardware','software','security','performance'];
const MODULE_LABELS = {system:'💻 系统',hardware:'🔧 硬件',software:'📦 软件',security:'🔒 安全',performance:'⚡ 性能'};
const SEVERITY_ORDER = {critical:0,warning:1,info:2};
let scanResults = {};
let chatWs = null;
let chatConnected = false;

// ==================== Init ====================
window.addEventListener('load', () => {
  initCharts();
  loadStatus();
});

// ==================== Status ====================
async function loadStatus() {
  try {
    const resp = await fetch('/api/status');
    const data = await resp.json();
    document.getElementById('ov-hostname').textContent = data.hostname;
    document.getElementById('ov-cpu').textContent = data.cpu_usage_pct + '%';
    document.getElementById('ov-load').textContent = '负载 ' + data.loadavg.split(' ').slice(0,3).join(' ');
    document.getElementById('ov-mem').textContent = data.memory.usage_pct + '%';
    document.getElementById('ov-mem-detail').textContent = data.memory.available_mb + ' MB 可用 / ' + data.memory.total_mb + ' MB';
    document.getElementById('ov-uptime').textContent = data.uptime_hours + 'h';
    document.getElementById('ov-kernel').textContent = data.kernel;
  } catch(e) { console.error('Status load failed:', e); }
}

// ==================== Charts ====================
let healthChart, findingsChart;

function initCharts() {
  healthChart = echarts.init(document.getElementById('chart-health'));
  findingsChart = echarts.init(document.getElementById('chart-findings'));

  healthChart.setOption({
    tooltip: { trigger: 'item' },
    radar: {
      indicator: MODULES.map(m => ({ name: MODULE_LABELS[m] || m, max: 10 })),
      shape: 'circle',
      splitArea: { areaStyle: { color: ['rgba(6,182,212,.05)','rgba(6,182,212,.1)'] } },
      axisLine: { lineStyle: { color: '#334155' } },
      splitLine: { lineStyle: { color: '#334155' } }
    },
    series: [{
      type: 'radar',
      data: [{ value: [0,0,0,0,0], name: '问题数', areaStyle: { color: 'rgba(6,182,212,.2)' }, lineStyle: { color: '#06b6d4' }, itemStyle: { color: '#06b6d4' } }]
    }]
  });

  findingsChart.setOption({
    tooltip: { trigger: 'item' },
    legend: { bottom: 0, textStyle: { color: '#94a3b8' } },
    series: [{
      type: 'pie',
      radius: ['40%','70%'],
      label: { color: '#e2e8f0' },
      data: [
        { value: 0, name: '严重', itemStyle: { color: '#ef4444' } },
        { value: 0, name: '警告', itemStyle: { color: '#eab308' } },
        { value: 0, name: '信息', itemStyle: { color: '#3b82f6' } }
      ]
    }]
  });

  window.addEventListener('resize', () => { healthChart.resize(); findingsChart.resize(); });
}

function updateCharts() {
  const values = MODULES.map(m => {
    const r = scanResults[m];
    if (!r || !r.summary) return 0;
    return (r.summary.critical || 0) + (r.summary.warning || 0);
  });

  healthChart.setOption({ series: [{ data: [{ value: values, name: '问题数' }] }] });

  let totalC=0, totalW=0, totalI=0;
  MODULES.forEach(m => {
    const r = scanResults[m];
    if (!r || !r.summary) return;
    totalC += r.summary.critical || 0;
    totalW += r.summary.warning || 0;
    totalI += r.summary.info || 0;
  });

  findingsChart.setOption({ series: [{ data: [
    { value: totalC, name: '严重', itemStyle: { color: '#ef4444' } },
    { value: totalW, name: '警告', itemStyle: { color: '#eab308' } },
    { value: totalI, name: '信息', itemStyle: { color: '#3b82f6' } }
  ] }] });
}

// ==================== Scan (REST) ====================
async function runScan(module) {
  const btn = document.getElementById('btnScan');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> 扫描中...';
  setStatus('scanning');

  const url = module ? `/api/scan/${module}` : '/api/scan';
  try {
    const resp = await fetch(url);
    const data = await resp.json();
    if (Array.isArray(data)) { data.forEach(r => { scanResults[r.module] = r; }); }
    else { scanResults[data.module] = data; }
    updateCards(); updateResults(); updateCharts();
    setStatus('ok');
  } catch (e) {
    setStatus('error');
    document.getElementById('results').innerHTML = `<div class="empty" style="color:var(--red)">❌ 扫描失败: ${e.message}</div>`;
  } finally {
    btn.disabled = false;
    btn.innerHTML = '🔍 全面扫描';
  }
}

// ==================== Scan (WebSocket) ====================
function runScanWS() {
  setStatus('scanning');
  const ws = new WebSocket(`ws://${location.host}/ws/scan`);
  const results = document.getElementById('results');
  results.innerHTML = '<div class="empty"><span class="spinner"></span> 实时扫描中...</div>';

  ws.onmessage = (event) => {
    const msg = JSON.parse(event.data);
    switch(msg.type) {
      case 'progress':
        results.innerHTML = `<div class="empty"><span class="spinner"></span> 正在扫描 ${MODULE_LABELS[msg.module]||msg.module} (${msg.current}/${msg.total})...</div>`;
        break;
      case 'result':
        scanResults[msg.module] = msg.data;
        updateCards(); updateCharts();
        break;
      case 'done':
        updateResults();
        setStatus('ok');
        break;
    }
  };
  ws.onerror = () => { setStatus('error'); results.innerHTML = '<div class="empty" style="color:var(--red)">❌ WebSocket 连接失败</div>'; };
}

// ==================== UI Updates ====================
function setStatus(s) {
  const dot = document.getElementById('statusDot');
  const txt = document.getElementById('statusText');
  dot.className = 'status-dot';
  if (s==='scanning') { dot.classList.add('warn'); txt.textContent='扫描中...'; }
  else if (s==='ok') { dot.classList.add('ok'); txt.textContent='就绪'; }
  else { dot.classList.add('err'); txt.textContent='异常'; }
}

function updateCards() {
  const container = document.getElementById('overview-cards');
  // Keep overview cards, update module cards below
  // Actually we don't have separate module cards in the new layout, charts handle it
}

function updateResults() {
  const container = document.getElementById('results');
  const allFindings = [];
  MODULES.forEach(m => {
    const r = scanResults[m];
    if (!r) return;
    (r.findings || []).forEach(f => { f._module = m; allFindings.push(f); });
  });

  if (allFindings.length === 0) {
    container.innerHTML = '<div class="empty">✅ 全部正常，未发现任何问题</div>';
    return;
  }

  allFindings.sort((a, b) => (SEVERITY_ORDER[a.severity]||9) - (SEVERITY_ORDER[b.severity]||9));

  container.innerHTML = '<div class="section"><h2>🔍 扫描结果 (' + allFindings.length + ' 项)</h2>' +
    allFindings.map(f => {
      const badge = f.severity==='critical'?'<span class="badge critical">严重</span>':
                    f.severity==='warning'?'<span class="badge warning">警告</span>':
                    '<span class="badge info">信息</span>';
      const fix = f.fix ? `<div class="fix">💡 ${esc(f.fix.description)}: <code>${esc(f.fix.command)}</code></div>` : '';
      const ev = f.evidence ? `<div class="evidence">${esc(f.evidence)}</div>` : '';
      return `<div class="finding">
        <div class="header">${badge} <span class="title">${esc(f.title)}</span></div>
        <div class="desc">${esc(f.description)}</div>
        ${fix}${ev}
      </div>`;
    }).join('') + '</div>';
}

function esc(s) { if(!s)return''; const d=document.createElement('div'); d.textContent=s; return d.innerHTML; }

// ==================== Report Export ====================
function exportJSON() { window.open('/api/report/json','_blank'); }
function exportHTML() { window.open('/api/report/html','_blank'); }

// ==================== Chat ====================
function toggleChat() {
  const panel = document.getElementById('chatPanel');
  panel.classList.toggle('hidden');
  if (!panel.classList.contains('hidden') && !chatConnected) {
    connectChat();
  }
}

function connectChat() {
  chatWs = new WebSocket(`ws://${location.host}/ws/chat`);
  const status = document.getElementById('chatStatus');

  chatWs.onopen = () => { chatConnected = true; status.textContent = '连接中...'; };
  chatWs.onmessage = (event) => {
    const msg = JSON.parse(event.data);
    switch(msg.type) {
      case 'ready':
        status.textContent = `已连接 (${msg.model})`;
        addChatMsg('assistant', '你好！我是麒麟医生 AI 助手。你可以问我系统问题，或输入 /scan 快速诊断。');
        break;
      case 'message':
        addChatMsg(msg.role, msg.content);
        break;
      case 'tool_call':
        addChatMsg('tool', `🔧 正在调用: ${msg.name}...`);
        break;
      case 'tool_result':
        addChatMsg('tool', msg.content);
        break;
      case 'error':
        addChatMsg('tool', `❌ ${msg.message}`);
        break;
    }
  };
  chatWs.onclose = () => { chatConnected = false; status.textContent = '已断开'; };
  chatWs.onerror = () => { status.textContent = '连接失败'; };
}

function sendChat() {
  const input = document.getElementById('chatInput');
  const text = input.value.trim();
  if (!text || !chatConnected) return;
  addChatMsg('user', text);
  chatWs.send(text);
  input.value = '';
}

function addChatMsg(role, content) {
  const container = document.getElementById('chatMessages');
  const div = document.createElement('div');
  div.className = `chat-msg ${role}`;
  div.textContent = content;
  container.appendChild(div);
  container.scrollTop = container.scrollHeight;
}
</script>
</body>
</html>
